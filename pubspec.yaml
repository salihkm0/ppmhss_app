name: school_management
description: A school management mobile app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^8.1.0
  
  # State Management
  flutter_redux: ^0.10.0
  redux: ^5.0.0
  redux_thunk: ^0.4.0
  
  # Networking
  dio: ^5.3.2
  connectivity_plus: ^7.1.1
  socket_io_client: ^3.1.4
  
  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^10.1.0
  
  # Navigation
  go_router: ^17.2.3
  
  # Forms
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.3.0
  
  # Date & Time
  intl: ^0.20.2
  table_calendar: ^3.0.9
  
  # Charts
  fl_chart: ^1.2.0
  
  # PDF & Export
  printing: ^5.11.1
  share_plus: ^12.0.2
  path_provider: ^2.1.1
  
  # Utilities
  image_picker: ^1.0.5
  cached_network_image: ^3.3.0
  pull_to_refresh: ^2.0.0
  shimmer: ^3.0.0
  badges: ^3.1.2
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  flutter_local_notifications: ^21.0.0

  url_launcher: ^6.2.5
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/